<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFIKCOIN ETERNAL | Professional Web3 Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .engine-card { background: #0f172a; border: 1px solid #334155; border-radius: 24px; padding: 24px; }
        .gold-glow { border-color: #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.1); }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-12">
        <div class="flex items-center gap-3">
            <img src="https://raw.githubusercontent.com/Efikcoinofficialecosystem/efikcoin-eternal/main/1772019882787.png" class="w-12 h-12 rounded-full border-2 border-yellow-500">
            <h1 class="text-2xl font-black text-yellow-500 tracking-tight">ECE ECOSYSTEM</h1>
        </div>
        <button id="connectBtn" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 px-8 rounded-2xl transition-all">
            Connect Wallet
        </button>
    </nav>

    <div class="max-w-6xl mx-auto grid lg:grid-cols-2 gap-10">
        
        <div class="engine-card gold-glow">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Swap Terminal
            </h2>
            <div class="space-y-4">
                <div class="bg-black/40 p-4 rounded-xl border border-gray-800">
                    <label class="text-xs text-gray-500">Pay with BNB</label>
                    <input id="swapInput" type="number" placeholder="0.0" class="w-full bg-transparent text-2xl font-bold outline-none mt-1">
                </div>
                <div class="bg-black/40 p-4 rounded-xl border border-gray-800">
                    <label class="text-xs text-gray-500">Receive ECE</label>
                    <input id="swapOutput" type="number" readonly placeholder="0.0" class="w-full bg-transparent text-2xl font-bold outline-none mt-1 text-yellow-500">
                </div>
                <button onclick="executeSwap()" class="w-full bg-yellow-500 py-5 rounded-2xl text-black font-black text-lg hover:brightness-110 transition-all">
                    CONFIRM TRANSACTION
                </button>
            </div>
        </div>

        <div class="engine-card">
            <h2 class="text-xl font-bold mb-6">Staking Rewards</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-800/50 p-4 rounded-xl">
                    <p class="text-xs text-gray-400">Total Staked</p>
                    <p id="totalStaked" class="text-xl font-bold">0.00 ECE</p>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-xl">
                    <p class="text-xs text-gray-400">Your APR</p>
                    <p class="text-xl font-bold text-green-400">12.5%</p>
                </div>
            </div>
            <button onclick="executeStake()" class="w-full border-2 border-yellow-500/30 py-4 rounded-2xl font-bold hover:bg-yellow-500/10 transition-all">
                Stake EfikCoin Eternal
            </button>
        </div>

    </div>

    <div class="max-w-6xl mx-auto mt-10">
        <div class="engine-card overflow-hidden">
            <h3 class="text-lg font-bold mb-4">Live Transaction Ledger</h3>
            <div id="ledger" class="text-sm font-mono text-gray-500 space-y-2">
                [SYSTEM]: Engine initialized. Waiting for wallet connection...
            </div>
        </div>
    </div>

    <script>
        // LEGACY CONFIGURATION
        const ECE_ADDRESS = "0x9F8C29E496ECB6C39c221458f211234DfCB233E0";
        const ROUTER_ADDRESS = "0x10ED43C718714eb63d5aA57B78B54704E256024E"; // PancakeSwap V2 Router
        
        // [{"inputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"symbol","type":"string"},{"internalType":"uint8","name":"decimals","type":"uint8"},{"internalType":"uint256","name":"supply","type":"uint256"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"address","name":"feeWallet","type":"address"},{"internalType":"string","name":"metadata_ipfs_hash","type":"string"}],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"owner","type":"address"},{"indexed":true,"internalType":"address","name":"spender","type":"address"},{"indexed":false,"internalType":"uint256","name":"value","type":"uint256"}],"name":"Approval","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"string","name":"metadata_ipfs_hash","type":"string"}],"name":"MetadataUpdated","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"previousOwner","type":"address"},{"indexed":true,"internalType":"address","name":"newOwner","type":"address"}],"name":"OwnershipTransferred","type":"event"},{"anonymous":false,"inputs":[{"indexed":false,"internalType":"address","name":"owner","type":"address"}],"name":"TeamFinanceTokenMint","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"from","type":"address"},{"indexed":true,"internalType":"address","name":"to","type":"address"},{"indexed":false,"internalType":"uint256","name":"value","type":"uint256"}],"name":"Transfer","type":"event"},{"inputs":[{"internalType":"address","name":"owner","type":"address"},{"internalType":"address","name":"spender","type":"address"}],"name":"allowance","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"amount","type":"u         const ECE_ABI = [ "function approve(address spender, uint256 amount) public returns (bool)" ]; 
        const ROUTER_ABI = [ "function swapExactETHForTokens(uint amountOutMin, address[] calldata path, address to, uint deadline) external payable returns (uint[] memory amounts)" ];

        let signer;
        let provider;

        async function connect() {
            if (window.ethereum) {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                const addr = await signer.getAddress();
                document.getElementById('connectBtn').innerText = addr.slice(0,6) + "..." + addr.slice(-4);
                logToLedger("Wallet connected: " + addr);
            }
        }

        async function executeSwap() {
            if (!signer) return alert("Connect Wallet First");
            const amount = document.getElementById('swapInput').value;
            const router = new ethers.Contract(ROUTER_ADDRESS, ROUTER_ABI, signer);
            
            logToLedger("Initiating Swap for " + amount + " BNB...");
            
            try {
                const path = [await router.WETH(), ECE_ADDRESS];
                const deadline = Math.floor(Date.now() / 1000) + 60 * 20; // 20 mins
                const tx = await router.swapExactETHForTokens(
                    0, // In production, calculate amountOutMin for slippage protection
                    path,
                    await signer.getAddress(),
                    deadline,
                    { value: ethers.utils.parseEther(amount) }
                );
                logToLedger("TX Sent: " + tx.hash);
                await tx.wait();
                logToLedger("TX Confirmed!");
            } catch (e) {
                logToLedger("Error: " + e.message);
            }
        }

        function logToLedger(msg) {
            const l = document.getElementById('ledger');
            l.innerHTML += `<div class="border-b border-gray-800 pb-1">> ${msg}</div>`;
        }

        document.getElementById('connectBtn').onclick = connect;
    </script>
</body>
</html>
