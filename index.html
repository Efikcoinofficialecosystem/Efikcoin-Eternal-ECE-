<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFIKCOIN ETERNAL | Professional Sovereign Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #030712; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(251, 191, 36, 0.2); border-radius: 28px; }
        .gold-text { color: #fbbf24; }
        .btn-primary { background: #fbbf24; color: #000; font-weight: 800; transition: all 0.2s; }
        .btn-primary:hover { background: #f59e0b; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-16">
        <div class="flex items-center gap-4">
            <img src="https://raw.githubusercontent.com/Efikcoinofficialecosystem/efikcoin-eternal/main/1772019882787.png" class="w-14 h-14 rounded-full border-2 border-yellow-500 shadow-lg">
            <div>
                <h1 class="text-2xl font-black gold-text leading-none uppercase">ECE LEGACY</h1>
                <p class="text-[10px] tracking-[0.3em] text-gray-500 font-bold uppercase mt-1">Sovereign Ecosystem</p>
            </div>
        </div>
        <button id="connectBtn" class="btn-primary py-3 px-8 rounded-2xl shadow-xl shadow-yellow-500/10">
            CONNECT WALLET
        </button>
    </nav>

    <div class="max-w-7xl mx-auto grid lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 glass-panel p-8">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black uppercase">Professional Swap</h2>
                <div class="text-xs bg-green-500/10 text-green-400 px-3 py-1 rounded-full border border-green-500/20 font-bold uppercase tracking-widest">Live Engine</div>
            </div>
            
            <div class="space-y-4">
                <div class="bg-black/40 p-6 rounded-2xl border border-gray-800">
                    <label class="text-xs font-bold text-gray-500 uppercase">Input Amount (BNB)</label>
                    <input id="swapInput" type="number" placeholder="0.00" class="w-full bg-transparent text-3xl font-black outline-none mt-2">
                </div>
                
                <div class="flex justify-center -my-6 relative z-10">
                    <div class="bg-yellow-500 p-3 rounded-full shadow-lg border-4 border-[#030712]">
                        <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                    </div>
                </div>

                <div class="bg-black/40 p-6 rounded-2xl border border-gray-800">
                    <label class="text-xs font-bold text-gray-500 uppercase">Estimated ECE</label>
                    <input id="swapOutput" type="number" readonly placeholder="0.00" class="w-full bg-transparent text-3xl font-black outline-none mt-2 gold-text">
                </div>

                <button onclick="executeSwap()" class="w-full btn-primary py-6 rounded-2xl text-xl mt-4">EXECUTE ON-CHAIN TRADE</button>
            </div>
        </div>

        <div class="space-y-8">
            <div class="glass-panel p-8">
                <h3 class="text-lg font-black gold-text mb-6 uppercase">Eternal Staking</h3>
                <div class="space-y-4 mb-6">
                    <div class="flex justify-between">
                        <span class="text-gray-500 text-sm">Your Staked Balance</span>
                        <span class="font-bold">0.00 ECE</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500 text-sm">Reward Accrued</span>
                        <span class="font-bold text-green-400">+0.00 ECE</span>
                    </div>
                </div>
                <button onclick="alert('Staking logic requires ABI. Paste it below to activate.')" class="w-full border-2 border-yellow-500/20 py-4 rounded-xl font-bold text-sm hover:bg-yellow-500/5 transition-all uppercase tracking-widest">Open Staking Sector</button>
            </div>

            <div class="glass-panel p-8 h-[300px] flex flex-col">
                <h3 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-4">Transaction Ledger</h3>
                <div id="ledger" class="flex-grow font-mono text-[10px] text-gray-400 overflow-y-auto space-y-2 p-2 bg-black/20 rounded-xl">
                    [SYSTEM]: Initializing Legacy Engine...<br>
                    [SYSTEM]: Awaiting Wallet Connection...
                </div>
            </div>
        </div>
    </div>

    <script>
        const ECE_ADDRESS = "0x9F8C29E496ECB6C39c221458f211234DfCB233E0";
        const PANCAKE_ROUTER = "0x10ED43C718714eb63d5aA57B78B54704E256024E";

        // COMPLETE ROUTER ABI - This fixes the "router.WETH is not a function" error
        const ROUTER_ABI = [
            "function WETH() external pure returns (address)",
            "function swapExactETHForTokens(uint amountOutMin, address[] calldata path, address to, uint deadline) external payable returns (uint[] memory amounts)",
            "function getAmountsOut(uint amountIn, address[] calldata path) external view returns (uint[] memory amounts)"
        ];

        let signer, provider;

        async function connect() {
            if (window.ethereum) {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                const address = await signer.getAddress();
                document.getElementById('connectBtn').innerText = address.slice(0,6) + "..." + address.slice(-4);
                logToLedger("CONNECTED: " + address);
            } else {
                alert("Please install TrustWallet or MetaMask");
            }
        }

        async function executeSwap() {
            if (!signer) return alert("Connect Wallet First");
            const val = document.getElementById('swapInput').value;
            if (!val || val <= 0) return alert("Enter valid amount");

            const router = new ethers.Contract(PANCAKE_ROUTER, ROUTER_ABI, signer);
            logToLedger("CALLING BLOCKCHAIN ENGINE...");

            try {
                const wethAddress = await router.WETH(); // This now works!
                const path = [wethAddress, ECE_ADDRESS];
                const deadline = Math.floor(Date.now() / 1000) + 60 * 20;

                const tx = await router.swapExactETHForTokens(
                    0, 
                    path,
                    await signer.getAddress(),
                    deadline,
                    { value: ethers.utils.parseEther(val) }
                );

                logToLedger("TX PENDING: " + tx.hash);
                await tx.wait();
                logToLedger("SUCCESS: Transaction confirmed on BSC!");
            } catch (err) {
                logToLedger("ERROR: " + (err.reason || err.message));
            }
        }

        function logToLedger(msg) {
            const l = document.getElementById('ledger');
            l.innerHTML += `> ${msg}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        document.getElementById('connectBtn').onclick = connect;
    </script>
</body>
</html>
