<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EfikCoin Eternal - Web3 Wallet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: #111;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .connect-btn { background: #f1c40f; }
        .login-btn { background: #3498db; color: white; }
        .register-btn { background: #2ecc71; color: white; }
        img { width: 120px; margin-bottom: 20px; }
        .info-box {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid #444;
        }
    </style>
</head>

<body>

    <img src="https://raw.githubusercontent.com/Efikcoinofficialecosystem/efikcoin-eternal/main/1772019882787.png">

    <h1>EfikCoin Eternal</h1>
    <p>The Real Human Growth Wallet on BSC</p>

    <div class="container">

        <button class="connect-btn" onclick="connectWallet()">Connect Wallet</button>
        <button class="login-btn" onclick="window.location='login.html'">Login</button>
        <button class="register-btn" onclick="window.location='register.html'">Register</button>

        <div class="info-box">
            <p><strong>Wallet:</strong> <span id="wallet">Not connected</span></p>
            <p><strong>ECE Balance:</strong> <span id="balance">0</span></p>
        </div>

        <button class="connect-btn" onclick="window.location='dashboard.html'">Go to Dashboard</button>

    </div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.7.5/dist/web3.min.js"></script>

<script>
const CONTRACT_ADDRESS = "0x9f8c29e496ecb6c39c221458f211234dfcb233e0";

const ABI = 
YOUR_ABI_HERE
;

let web3;
let account;

// Connect Wallet
async function connectWallet() {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);

        try {
            const accounts = await ethereum.request({ method: "eth_requestAccounts" });
            account = accounts[0];
            document.getElementById("wallet").innerText = account;

            checkNetwork();
            loadBalance();

        } catch (error) {
            alert("Wallet connection rejected");
        }
    } else {
        alert("MetaMask not found. Install it to continue.");
    }
}

// Ensure BSC Network
async function checkNetwork() {
    const chainId = await ethereum.request({ method: "eth_chainId" });

    if (chainId !== "0x38") {
        alert("Switching to Binance Smart Chain...");
        await ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: "0x38" }]
        });
    }
}

// Load ECE Balance
async function loadBalance() {
    const contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);
    const balance = await contract.methods.balanceOf(account).call();
    const decimals = await contract.methods.decimals().call();

    const formatted = balance / (10 ** decimals);
    document.getElementById("balance").innerText = formatted;
}

</script>

</body>
</html>
